<!DOCTYPE html>
<html>
<head>
    <title>Book Now - Grand Plaza Hotel</title>
</head>
<body>
    <div>
        <h2>BOOK YOUR STAY</h2>
        <p>Simple • Fast • Secure Booking</p>
    </div>

    <nav>
        <a href="index.html">Home</a>
        <a href="rooms.html">Rooms</a>
        <a href="BookNow.html">Book Now</a>
    </nav>

    <form>
        <fieldset>
            <legend>Personal Details</legend>
            <label>Name: </label><br>
            <input type="text" placeholder="Enter your full name"><br>
            <label>Email: </label><br>
            <input type="email" placeholder="Enter your email address"><br>
            <label>Phone: </label><br>
            <input type="tel" placeholder="Enter your phone number"><br>
        </fieldset>

        <fieldset>
            <legend>Booking Details</legend>
            <label>Room Type: </label><br>
            <select required>
                <option value="">Select Room</option>
                <option>Deluxe - ₹3000 / night</option>
                <option>Executive - ₹5000 / night</option>
                <option>Suite - ₹8000 / night</option>
            </select><br>
            <label>Check-in Date: </label><br>
            <input type="date"><br>
            <label>Check-out Date: </label><br>
            <input type="date"><br>
            <label>Number of Guests: </label><br>
            <input type="number" min="1" max="5" placeholder="Enter number of guests"><br>
        </fieldset>

        <fieldset>
            <legend>Additional Information</legend>
            <label>Meal Plan: </label><br>
            <select>
                <option value="">Select Meal Plan</option>
                <option>Breakfast Only</option>
                <option>Breakfast & Dinner</option>
                <option>Breakfast, Lunch & Dinner</option>
            </select><br>
            <label>Special Requests: </label><br>
            <textarea rows="4" cols="30" placeholder="Enter any special requests or requirements"></textarea><br>
        </fieldset>

        <fieldset>
            <legend>Select Payment Method</legend>
            <div>
                <button type="submit" href="upi.html">Pay with UPI</button>
                <button type="submit" href="card.html">Pay with Card</button>
                <button type="submit" href="netbanking.html">Pay with Net Banking</button>
            </div>
        </fieldset>
    </form>

    <footer>
        <p>2026 Grand Plaza Hotel</p>
        <p>Customer Support:</p>
        <p>+91 8263902240</p>
        <p>aniket.grandplazahotel@gmail.com</p>
    </footer>

</body>
</html>
